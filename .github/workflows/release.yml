name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Get commits since previous tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file for multiline handling
          echo "$COMMITS" > changelog.txt

          # Create release notes
          cat > release_notes.md << EOF
          ## Что нового

          $COMMITS

          ## Установка

          \`\`\`bash
          git clone https://github.com/DanilenkA/VMware_MCP_SERVER.git
          cd VMware_MCP_SERVER
          git checkout ${{ steps.get_version.outputs.VERSION }}
          cp env.example .env
          # Настройте .env с вашими credentials
          docker compose up -d
          \`\`\`

          ## Docker Image

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository_owner }}/vmware-mcp-server:${{ steps.get_version.outputs.VERSION }}
          \`\`\`

          ## Документация

          - [README.md](README.md) — полное описание возможностей
          - [SKILL.md](SKILL.md) — гайд для AI-агентов (46+ инструментов)

          Полный changelog: [\`${PREV_TAG}...${{ steps.get_version.outputs.VERSION }}\`](https://github.com/DanilenkA/VMware_MCP_SERVER/compare/${PREV_TAG}...${{ steps.get_version.outputs.VERSION }})
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vmware-mcp-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
